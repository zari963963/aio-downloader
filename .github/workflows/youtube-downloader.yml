---
name: youtube-downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: >
          Enter one or more URLs with optional arguments.
          Separate entries with newlines, commas, or spaces.
          Example:
          https://www.youtube.com/watch?v=dfdXGw1xY9A v 480
          https://www.youtube.com/watch?v=dfdXGw1xY9A v 1080
          or: https://www.youtube.com/watch?v=dfdXGw1xY9A v 480, https://... v 720
        required: true

jobs:
  actions:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Write YouTube cookies from secret
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > youtube-cookies.txt
            echo "YouTube cookies written."
          else
            echo "No YOUTUBE_COOKIES secret found – proceeding without cookies."
          fi
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      # ── Parse all entries into a JSON array ─────────────────
      - name: Parse all entries (multiple URLs/args)
        id: parse_entries
        run: |
          INPUT="${{ github.event.inputs.url }}"
          # Replace commas with newlines to normalise delimiters
          MODIFIED=$(echo "$INPUT" | tr ',' '\n')
          ENTRIES='[]'
          while IFS= read -r line; do
            line=$(echo "$line" | xargs)  # trim
            [ -z "$line" ] && continue
            # Split line into tokens
            tokens=($line)
            i=0
            while [ $i -lt ${#tokens[@]} ]; do
              token="${tokens[$i]}"
              if [[ "$token" =~ ^https?:// ]]; then
                link="$token"
                args=()
                i=$((i+1))
                # Collect everything until the next URL or end
                while [ $i -lt ${#tokens[@]} ]; do
                  next="${tokens[$i]}"
                  if [[ "$next" =~ ^https?:// ]]; then
                    break
                  fi
                  args+=("$next")
                  i=$((i+1))
                done
                # Build JSON entry
                args_json=$(printf '%s\n' "${args[@]}" | jq -R . | jq -s .)
                entry=$(jq -n --arg link "$link" --argjson args "$args_json" '{link: $link, args: $args}')
                ENTRIES=$(echo "$ENTRIES" | jq ". + [$entry]")
              else
                # Token that is not a URL – skip it (malformed line)
                i=$((i+1))
              fi
            done
          done <<< "$MODIFIED"

          # Compact JSON for GitHub Actions output
          ENTRIES_JSON=$(echo "$ENTRIES" | jq -c .)
          echo "ENTRIES_JSON=$ENTRIES_JSON" >> $GITHUB_OUTPUT

          # Determine if any entry is YouTube
          IS_ANY_YT=$(echo "$ENTRIES" | jq '[.[].link | test("youtube\\.com/watch\\?v=|youtu\\.be/")] | any')
          echo "IS_ANY_YT=$IS_ANY_YT" >> $GITHUB_OUTPUT
          echo "Parsed $(echo "$ENTRIES" | jq length) entries, any YouTube? $IS_ANY_YT"

      # ── Prepare PATH (only if at least one YouTube link) ───
      - name: Prepare PATH for tools
        if: steps.parse_entries.outputs.IS_ANY_YT == 'true'
        run: |
          mkdir -p ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      # ── Install tools ─────────────────────────────────────
      - name: Install tools (if any YouTube link)
        if: steps.parse_entries.outputs.IS_ANY_YT == 'true'
        run: |
          if ! command -v yt-dlp &> /dev/null; then
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o ~/.local/bin/yt-dlp
            chmod a+rx ~/.local/bin/yt-dlp
          fi
          if ! command -v jq &> /dev/null || ! command -v ffmpeg &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq jq ffmpeg
          fi
          if ! command -v deno &> /dev/null; then
            curl -fsSL https://deno.land/install.sh | sh -s -- -y
          fi

      # ── Process all downloads, remux (video), and ZIP ─────
      - name: Download, remux, and ZIP all files
        run: |
          set -e
          ENTRIES_JSON='${{ steps.parse_entries.outputs.ENTRIES_JSON }}'
          YT_DLP_ARGS="--cookies youtube-cookies.txt --js-runtimes deno --remote-components ejs:npm --no-progress"
          mkdir -p youtube-content youtube

          # ── Helper: progress display (same as original) ──
          download_with_progress() {
            local yt_args="$1"
            local output_template="$2"
            local total_size="$3"
            local url="$4"
            yt-dlp $yt_args -o "$output_template" "$url" &
            local dl_pid=$!
            local output_dir="$(dirname "$output_template")"
            sleep 1
            while kill -0 $dl_pid 2>/dev/null; do
              local part_file=$(ls "$output_dir"/*.part 2>/dev/null | head -n1)
              if [ -n "$part_file" ]; then
                local current=$(stat -c%s "$part_file" 2>/dev/null || echo 0)
                if [ "$total_size" -gt 0 ]; then
                  local percent=$(awk -v cur="$current" -v total="$total_size" 'BEGIN {printf "%.1f", (cur/total)*100}')
                  echo "[yt-dlp] ${current} / ${total_size} bytes (${percent}%)"
                else
                  echo "[yt-dlp] ${current} bytes downloaded (total unknown)"
                fi
              else
                echo "[yt-dlp] Waiting for download to start..."
              fi
              sleep 1
            done
            wait $dl_pid
            local final_file=$(ls "$output_dir"/*.part 2>/dev/null | head -n1)
            if [ -n "$final_file" ]; then
              local final_size=$(stat -c%s "$final_file")
              echo "[yt-dlp] Completed: ${final_size} bytes"
            fi
          }

          # ── Loop over entries ─────────────────────────────
          count=$(echo "$ENTRIES_JSON" | jq length)
          for ((idx=0; idx<count; idx++)); do
            entry=$(echo "$ENTRIES_JSON" | jq ".[$idx]")
            link=$(echo "$entry" | jq -r '.link')
            args_len=$(echo "$entry" | jq '.args | length')

            # Default arguments
            type="v"
            val1="max"
            val2=""
            if [ "$args_len" -ge 1 ]; then
              type=$(echo "$entry" | jq -r '.args[0]')
            fi
            if [ "$args_len" -ge 2 ]; then
              val1=$(echo "$entry" | jq -r '.args[1]')
            fi
            if [ "$args_len" -ge 3 ]; then
              val2=$(echo "$entry" | jq -r '.args[2]')
            fi

            # Normalise type and value
            if [[ "$type" != "v" && "$type" != "a" ]]; then
              echo "Invalid type '$type' – defaulting to v(ideo) max"
              type="v"; val1="max"; val2=""
            fi
            if [ "$type" = "v" ]; then
              case "$val1" in
                2k) val1=1440 ;;
                4k) val1=2160 ;;
              esac
            fi

            echo "----------------------------------------"
            echo "Processing entry $((idx+1))/$count: $link  ($type $val1 $val2)"

            # ── YouTube or non‑YouTube? ──────────────────
            if echo "$link" | grep -Eq '(youtube\.com/watch\?v=|youtu\.be/)'; then
              # Get metadata
              video_json=$(yt-dlp $YT_DLP_ARGS -j "$link") || {
                echo "ERROR: yt-dlp failed to fetch metadata, skipping."
                continue
              }

              if [ "$type" = "v" ]; then
                combined=$(echo "$video_json" | jq '[.formats[] | select(.vcodec != "none" and .acodec != "none")]')
                if [ "$(echo "$combined" | jq length)" -eq 0 ]; then
                  echo "ERROR: No combined video+audio formats, skipping."
                  continue
                fi

                case "$val1" in
                  max)
                    format_id=$(echo "$combined" | jq -r 'max_by(.height, .fps) | .format_id') ;;
                  min)
                    format_id=$(echo "$combined" | jq -r 'min_by(.height, .fps) | .format_id') ;;
                  *)
                    height="$val1"; fps="${val2:-0}"
                    heights=$(echo "$combined" | jq '[.[].height] | unique | sort')
                    chosen_height=$(echo "$heights" | jq --argjson h "$height" 'map({h:., d:(. - $h | abs)}) | sort_by(.d, .h) | first.h')
                    matching=$(echo "$combined" | jq --argjson h "$chosen_height" 'map(select(.height == $h))')
                    if [ "$fps" -gt 0 ]; then
                      exact=$(echo "$matching" | jq --argjson f "$fps" 'map(select(.fps == $f))')
                      if [ "$(echo "$exact" | jq length)" -gt 0 ]; then
                        format_id=$(echo "$exact" | jq -r 'first.format_id')
                      else
                        format_id=$(echo "$matching" | jq -r 'max_by(.fps) | .format_id')
                      fi
                    else
                      format_id=$(echo "$matching" | jq -r 'max_by(.fps) | .format_id')
                    fi
                    ;;
                esac

                total_size=$(echo "$video_json" | jq -r ".formats[] | select(.format_id == \"$format_id\") | .filesize // .filesize_approx // 0")
                height_info=$(echo "$video_json" | jq -r ".formats[] | select(.format_id == \"$format_id\") | .height // 0")
                fps_info=$(echo "$video_json" | jq -r ".formats[] | select(.format_id == \"$format_id\") | .fps // 0")

                # Unique filename using height & FPS
                output_template="youtube-content/%(title)s-${height_info}p-${fps_info}fps.%(ext)s"
                echo "Downloading video format $format_id → $output_template"
                if ! download_with_progress "$YT_DLP_ARGS -f $format_id" "$output_template" "$total_size" "$link"; then
                  echo "Download failed, skipping remux."
                  continue
                fi

                # Remux
                echo "Remuxing..."
                cd youtube-content
                input_file=$(ls -1t *${height_info}p_${fps_info}fps.* 2>/dev/null | head -n1)
                if [ -n "$input_file" ]; then
                  remuxed="remuxed_${input_file}"
                  ffmpeg -i "$input_file" -c copy "$remuxed" -y && {
                    rm "$input_file"
                    mv "$remuxed" "$input_file"
                    echo "Remux successful."
                  } || echo "Remux failed, original file kept."
                fi
                cd ..

              elif [ "$type" = "a" ]; then
                audio_formats=$(echo "$video_json" | jq '[.formats[] | select(.vcodec == "none" and .acodec != "none")]')
                if [ "$(echo "$audio_formats" | jq length)" -eq 0 ]; then
                  echo "ERROR: No audio-only formats, skipping."
                  continue
                fi

                case "$val1" in
                  max)
                    format_id=$(echo "$audio_formats" | jq -r 'max_by(.abr // .tbr) | .format_id') ;;
                  min)
                    format_id=$(echo "$audio_formats" | jq -r 'min_by(.abr // .tbr) | .format_id') ;;
                  *)
                    bitrate="$val1"
                    bitrates=$(echo "$audio_formats" | jq '[.[].abr // .tbr] | unique | sort')
                    chosen_bitrate=$(echo "$bitrates" | jq --argjson b "$bitrate" 'map({br:., d:(. - $b | abs)}) | sort_by(.d, .br) | first.br')
                    format_id=$(echo "$audio_formats" | jq -r --argjson br "$chosen_bitrate" 'map(select((.abr // .tbr) == $br)) | first.format_id')
                    ;;
                esac

                total_size=$(echo "$video_json" | jq -r ".formats[] | select(.format_id == \"$format_id\") | .filesize // .filesize_approx // 0")
                abr_info=$(echo "$video_json" | jq -r ".formats[] | select(.format_id == \"$format_id\") | .abr // .tbr // 0")

                output_template="youtube-content/%(title)s-${abr_info}kbps.%(ext)s"
                echo "Downloading audio format $format_id → $output_template"
                download_with_progress "$YT_DLP_ARGS -f $format_id" "$output_template" "$total_size" "$link" || {
                  echo "Audio download failed, skipping."
                  continue
                }
              fi
            else
              # Non‑YouTube simple download
              echo "Non‑YouTube link: $link"
              cd youtube-content
              wget --progress=bar:force --content-disposition "$link" || {
                echo "wget failed, skipping."
                cd ..
                continue
              }
              cd ..
            fi
          done

          # ── ZIP every downloaded file individually ────────
          echo "========================================"
          echo "Creating split ZIP archives for each file..."
          cd youtube-content
          for file in *; do
            if [ -f "$file" ]; then
              echo "→ Zipping $file"
              # -j : junk (strip) path, so file is added directly to the root of the ZIP
              zip -j -s 99m -r "../youtube/${file}.zip" "$file"
            fi
          done
          cd ..

      # ── Upload all ZIP parts ───────────────────────────────
      - name: Upload to youtube folder
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000

          FILES=(youtube/*)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No files to upload."
            exit 0
          fi

          git add youtube/
          git commit -m "Add download parts [skip ci]" || echo "Nothing to commit"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              if [ $i -lt $RETRIES ]; then
                echo "Push rejected, retrying in 3 seconds..."
                sleep 3
              else
                echo "Push failed after $RETRIES attempts."
                exit 1
              fi
            fi
          done
          echo "All files uploaded to the 'youtube' folder."
