---
name: direct-downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: >
          Enter one or more Direct Download URLs.
          Separate by commas, spaces, or newlines.
        required: true

jobs:
  actions:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Install aria2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2

      - name: Parse URLs
        id: parse
        run: |
          URLS_INPUT="${{ github.event.inputs.url }}"
          # Replace commas and newlines with spaces, then clean up
          URLS=$(echo "$URLS_INPUT" | tr ',' ' ' | tr '\n' ' ' | tr -s ' ' | sed 's/^ *//;s/ *$//')
          if [ -z "$URLS" ]; then
            echo "No URLs provided." >&2
            exit 1
          fi
          echo "$URLS" | tr ' ' '\n' > urls.txt
          echo "URLs to download:"
          cat urls.txt
          NUM=$(wc -l < urls.txt)
          echo "NUM_URLS=$NUM" >> $GITHUB_OUTPUT

      - name: Download and zip each file
        run: |
          mkdir -p direct
          index=0
          while IFS= read -r url; do
            index=$((index + 1))
            echo "----------------------------------------"
            echo "Processing URL $index: $url"

            # Download into a unique temporary folder for this URL
            DL_DIR="dl_$index"
            mkdir -p "$DL_DIR"
            aria2c -x 16 -s 16 -d "$DL_DIR" --console-log-level=warn --summary-interval=10 "$url"

            # Get the downloaded filename (there will be exactly one file)
            DL_FILE=$(ls -1 "$DL_DIR" | head -n1)
            if [ -z "$DL_FILE" ]; then
              echo "Download failed or no file found for $url"
              rm -rf "$DL_DIR"
              continue
            fi
            echo "Downloaded: $DL_FILE"

            # Generate a random 5-letter string (lowercase a-z)
            RAND5=$(tr -dc 'a-z' </dev/urandom | head -c5)

            # Append the random string before the final .zip extension
            ZIP_BASE="${DL_FILE}_${RAND5}"
            ZIP_NAME="${ZIP_BASE}.zip"
            echo "ZIP output: $ZIP_NAME"

            # Create temporary folder to hold only this file
            TMPZIP="tmpzip_$index"
            mkdir -p "$TMPZIP"
            cp "$DL_DIR/$DL_FILE" "$TMPZIP/"

            # Create split zip with the file at the archive root
            (cd "$TMPZIP" && zip -s 99m "../direct/${ZIP_NAME}" "$DL_FILE")

            # Cleanup
            rm -rf "$DL_DIR" "$TMPZIP"
          done < urls.txt

      - name: Upload to direct folder
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000

          if [ -z "$(ls -A direct/)" ]; then
            echo "No files to upload."
            exit 0
          fi

          git add direct/
          COMMIT_MSG="Add: $(ls -1 direct/ | tr '\n' ' ' | sed 's/ *$//') [skip ci]"
          git commit -m "$COMMIT_MSG" || echo "Nothing to commit"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              [ $i -lt $RETRIES ] && sleep 3 || exit 1
            fi
          done
